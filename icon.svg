  <!-- orbit rings: cobalt handle blue -->
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#3555C8" stroke-width="2.5" opacity=".9" transform="rotate(-24 32 32)"/>
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#3555C8" stroke-width="2" opacity=".45" transform="rotate(38 32 32)"/>
  <!-- core planet: coral lid -->
