<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root{
    /* “Buttercup” palette: cream body, cobalt handle, golden lid, coral top, caramel band */
    --accent:#3555C8; --accent-soft:#E4EAFB; --panel:#FFFDF2; --bg2:#F6EFCF;
    --text:#38332A; --muted:#8F8668; --border:#E9DFBE;
    --todo:#3555C8; --doing:#EFA63C; --waiting:#E5785C; --done:#BC7A2F;
  }
  .dark{
    --accent:#7C92E8; --panel:#2A2620; --bg2:#211E18; --text:#F1EBD9; --muted:#B3AA8D;
    --border:#4C4534; --accent-soft:#33406F;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #backdrop{position:fixed;inset:0;background:rgba(15,16,25,.45);display:flex;align-items:center;justify-content:center;padding:24px}
  #panel{background:var(--panel);color:var(--text);border-radius:16px;width:min(1080px,96vw);height:min(720px,92vh);display:flex;flex-direction:column;box-shadow:0 18px 60px rgba(0,0,0,.35);overflow:hidden}
  header{display:flex;align-items:center;gap:4px;padding:12px 16px 0;border-bottom:1px solid var(--border);flex-shrink:0}
  header h1{font-size:15px;margin:0 12px 10px 0;white-space:nowrap}
  header h1 span{color:var(--accent)}
  .tab{border:none;background:none;padding:8px 12px 12px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  #closeBtn{margin-left:auto;border:none;background:none;font-size:17px;cursor:pointer;color:var(--muted);padding:0 4px 10px}
  #content{flex:1;overflow:auto;padding:14px 16px}
  .hint{color:var(--muted);font-size:12px;margin-top:10px}
  /* Project filter chips */
  .chipbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .chipbar .lbl{font-size:11px;font-weight:700;color:var(--muted)}
  .chip{background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:3px 11px;font-size:12px;cursor:pointer;color:var(--muted)}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* Projects table extras */
  .subtabs{display:flex;gap:6px;margin-bottom:12px}
  .subtab{border:1px solid var(--border);background:var(--bg2);color:var(--muted);border-radius:8px;padding:5px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
  .subtab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .bar{background:var(--bg2);border-radius:99px;height:7px;width:90px;overflow:hidden;display:inline-block;vertical-align:middle}
  .bar i{display:block;height:100%;background:var(--done);border-radius:99px}
  .prop{display:inline-block;font-size:10.5px;background:var(--accent-soft);color:var(--accent);border-radius:6px;padding:1px 7px;margin:1px 3px 1px 0}
  .num{text-align:center}
  .late{color:#E05252;font-weight:700}
  /* Kanban */
  .board{display:flex;gap:12px;align-items:flex-start;min-height:100%}
  .col{background:var(--bg2);border-radius:13px;padding:10px;width:250px;flex-shrink:0}
  .col h3{margin:2px 4px 10px;font-size:13px;display:flex;justify-content:space-between}
  .col h3 .cnt{color:var(--muted)}
  .card{background:var(--panel);border-radius:10px;padding:9px 11px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.12);border-left:4px solid var(--border);font-size:13px;cursor:grab}
  .card .t{font-weight:600;line-height:1.35;cursor:pointer}
  .card .t:hover{color:var(--accent)}
  .card.k-todo{border-left-color:var(--todo)} .card.k-doing{border-left-color:var(--doing)}
  .card.k-waiting{border-left-color:var(--waiting)} .card.k-done{border-left-color:var(--done)}
  .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center}
  .badge{font-size:10.5px;background:var(--bg2);border-radius:6px;padding:2px 7px;color:var(--muted)}
  .badge.mail{background:#FFF4E0;color:#9A6B15}
  .dark .badge.mail{background:#4A3D22;color:#EFC77B}
  .card select{margin-left:auto;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--muted);padding:1px 3px}
  .col.dragover{outline:2px dashed var(--accent)}
  /* Table */
  table{border-collapse:collapse;width:100%;font-size:13px}
  th{text-align:left;padding:9px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:11.5px;cursor:pointer;white-space:nowrap;user-select:none}
  td{padding:8px 10px;border-bottom:1px solid var(--border)}
  td .t{font-weight:600;cursor:pointer}
  td .t:hover{color:var(--accent)}
  td select{border:1px solid var(--border);border-radius:7px;padding:4px 6px;font-size:12.5px;background:var(--panel);color:var(--text)}
  /* Calendar */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .calhead h2{font-size:15px;margin:0}
  .cbtn{border:none;background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:5px 12px;font-weight:700;cursor:pointer;font-size:12.5px}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .dow{text-align:center;font-size:10.5px;color:var(--muted);font-weight:700;padding:3px 0}
  .day{background:var(--bg2);border-radius:9px;min-height:76px;padding:5px;font-size:11px;overflow:hidden}
  .day.dim{opacity:.4}
  .day.today{outline:2px solid var(--accent)}
  .day .n{font-weight:700;font-size:10.5px;color:var(--muted);margin-bottom:3px}
  .evt{border-radius:5px;padding:2px 5px;margin-bottom:3px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;cursor:pointer}
  .evt.k-todo{background:var(--todo)} .evt.k-doing{background:var(--doing)}
  .evt.k-waiting{background:var(--waiting)} .evt.k-done{background:var(--done);text-decoration:line-through}
  .evt.gcal{background:transparent;border:1px solid var(--done);color:var(--done);font-weight:600;cursor:default}
  /* Week view (task planner + time box) */
  .wscroll{overflow-x:auto;padding-bottom:8px}
  .wrow{display:grid;grid-template-columns:46px repeat(7,minmax(205px,1fr));gap:8px}
  .wday{background:var(--bg2);border-radius:12px;padding:9px;min-height:240px}
  .wday.today{outline:2px solid var(--accent)}
  .wday.dragover,.tcol.dragover{outline:2px dashed var(--accent)}
  .wtask{cursor:grab}
  .wday .wh{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .wday .wh b{color:var(--text);font-size:14px}
  .wday .evt{white-space:normal;line-height:1.3;font-size:10.5px}
  .wbar{width:100%;height:6px;margin-bottom:8px}
  .unsbox{background:var(--bg2);border-radius:12px;padding:9px 12px;margin-bottom:10px}
  .unslist{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:0 14px}
  .wbar i{background:#5CB85C}
  .wadd input{width:100%;border:1px dashed var(--border);border-radius:8px;padding:7px 9px;font-size:12px;background:var(--panel);color:var(--text);margin-bottom:8px}
  .wtask{background:var(--panel);border-radius:9px;padding:8px 9px;margin-bottom:7px;font-size:12.5px;box-shadow:0 1px 2px rgba(0,0,0,.08);display:flex;gap:8px;align-items:flex-start}
  .wtask input[type=checkbox]{accent-color:#5CB85C;margin-top:2px;flex-shrink:0}
  .wtask .tt{cursor:pointer;line-height:1.35}
  .wtask .tt:hover{color:var(--accent)}
  .wtask.done .tt{text-decoration:line-through;color:var(--muted)}
  /* Time box (hour grid) */
  .tcol{position:relative;background-color:var(--bg2);border-radius:10px;
    background-image:repeating-linear-gradient(to bottom,var(--border) 0,var(--border) 1px,transparent 1px,transparent 32px)}
  .tcol.today{outline:2px solid var(--accent)}
  .tgut{position:relative}
  .tlab{position:absolute;right:6px;font-size:9.5px;color:var(--muted)}
  .tevt{position:absolute;left:3px;right:3px;background:var(--accent-soft);border-left:3px solid var(--accent);
    border-radius:6px;padding:2px 5px;font-size:10px;line-height:1.25;overflow:hidden;color:var(--text)}
  .tevt.task{background:var(--panel);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .tevt.task.k-todo{border-left-color:var(--todo)} .tevt.task.k-doing{border-left-color:var(--doing)}
  .tevt.task.k-waiting{border-left-color:var(--waiting)} .tevt.task.k-done{border-left-color:var(--done);text-decoration:line-through}
  .tcol{cursor:copy}
  .tboxh{font-size:12px;color:var(--muted);font-weight:700;margin:12px 0 6px}
  /* Discuss */
  .topic{display:flex;gap:9px;align-items:flex-start;padding:8px 4px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
  .topic input{margin-top:2px;accent-color:var(--accent)}
  .topic .kw{font-weight:700;font-size:10.5px;border-radius:5px;padding:1px 6px;color:#fff}
  .kw.todo{background:var(--todo)}.kw.doing{background:var(--doing)}.kw.waiting{background:var(--waiting)}
  /* Email form */
  .form{max-width:560px}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:4px}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:inherit;background:var(--panel);color:var(--text)}
  .field textarea{min-height:90px;resize:vertical}
  .btn{border:none;background:var(--accent);color:#fff;border-radius:9px;padding:10px 18px;font-size:13.5px;font-weight:600;cursor:pointer}
  .ok{color:var(--done);font-weight:600;font-size:13px;margin-left:10px}
  .empty{text-align:center;color:var(--muted);padding:40px;font-size:13.5px}
</style>
</head>
<body>
<div id="backdrop">
  <div id="panel">
    <header>
      <h1>◉ Orbit<span>als</span></h1>
      <button class="tab" data-v="kanban">📋 Kanban</button>
      <button class="tab" data-v="table">▦ Table</button>
      <button class="tab" data-v="calendar">📅 Calendar</button>
      <button class="tab" data-v="discuss">💬 Discuss</button>
      <button class="tab" data-v="email">📧 Email → Task</button>
      <button id="coffeeBtn" title="Enjoying Orbitals? Buy me a coffee ☕" style="margin-left:auto;border:none;background:none;font-size:15px;cursor:pointer;padding:0 2px 10px">☕</button>
      <button id="closeBtn" title="Close (Esc)" style="margin-left:0">✕</button>
    </header>
    <div id="content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@logseq/libs"></script>
<script>
"use strict";
/* Column model: Logseq markers → 4 lanes */
const LANES=[
  ["todo","📥 To Do",["TODO","LATER"]],
  ["doing","🔄 Doing",["DOING","NOW"]],
  ["waiting","⏳ Waiting",["WAITING"]],
  ["done","✅ Done",["DONE"]]
];
const LANE_KW={todo:"TODO",doing:"DOING",waiting:"WAITING",done:"DONE"}; // marker written on move
const MARKER_RE=/^(TODO|DOING|NOW|LATER|WAITING|DONE|CANCELED|CANCELLED)\s*/;
let tasks=[], view="kanban", calY, calM, calMode="week", weekAnchor=new Date(), sortKey="lane", sortDir=1;
let projectFilter=null, statusFilter=null, tblMode="projects", pSortKey="total", pSortDir=-1, chipsOpen=false;
const now=new Date(); calY=now.getFullYear(); calM=now.getMonth();
const pageCache={}; let pageMeta={}, projCanon={}, allNsPages=[];
const metaOf=pn=>pageMeta[(pn||"").toLowerCase()]||{};

const esc=s=>String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const laneOf=m=>{ const l=LANES.find(l=>l[2].includes(m)); return l?l[0]:"todo"; };

/* ---------- Data from Logseq ---------- */
async function refresh(){
  let rows=[];
  try{ rows=await logseq.DB.q("(task TODO DOING NOW LATER WAITING DONE)")||[]; }
  catch(e){ console.error("Orbitals query failed",e); }
  tasks=[];
  for(const b of rows){
    const uuid=(b.uuid&&b.uuid.$uuid$)||b.uuid; if(!uuid) continue;
    const content=b.content||"";
    const marker=b.marker||((content.match(MARKER_RE)||[])[1])||"TODO";
    let title=content.split("\n")[0].replace(MARKER_RE,"")
      .replace(/\[#[ABC]\]\s*/,"").trim();
    const gm=title.match(/\[[^\]]*\]\((https:\/\/mail\.google\.com[^)]*)\)/);
    const gmailLink=gm?gm[1]:"";
    if(gm) title=title.replace(gm[0],"").replace(/\s{2,}/g," ").trim();
    const schm=content.match(/SCHEDULED:\s*<([^>]+)>/), dlm=content.match(/DEADLINE:\s*<([^>]+)>/);
    const dpart=s=>s?((s.match(/\d{4}-\d{2}-\d{2}/)||[])[0]||""):"";
    const tpart=s=>s?((s.match(/\b(\d{1,2}:\d{2})\b/)||[])[1]||""):"";
    const sch=[null,dpart(schm&&schm[1])], dl=dlm&&dpart(dlm[1])?[null,dpart(dlm[1])]:null;
    const ttime=(dl&&dl[1])?tpart(dlm[1]):tpart(schm&&schm[1]);
    let pageName="";
    try{
      if(b.page&&(b.page.originalName||b.page.name)) pageName=b.page.originalName||b.page.name;
      else if(b.page&&b.page.id!=null){
        if(!(b.page.id in pageCache)){ const p=await logseq.Editor.getPage(b.page.id); pageCache[b.page.id]=p?(p.originalName||p.name):""; }
        pageName=pageCache[b.page.id];
      }
    }catch(e){}
    const prm=content.match(/\[\[([^\]\/\n]+\/[^\]\n]+)\]\]/); // Tana-style: task links to [[type/name]]
    tasks.push({uuid,marker,lane:laneOf(marker),title:title||"(untitled)",page:pageName||"(no page)",projRef:prm?prm[1]:"",gmailLink,raw:content.toLowerCase(),
      date:(dl&&dl[1])||(sch&&sch[1])||"",time:ttime,isDeadline:!!dl,isEmail:!!gmailLink||/#email\b/i.test(content)});
  }
  // page metadata (properties + journal/template flags) for filters and the Project table
  // — refetched on every refresh so property edits (status::, client:: …) show up immediately
  const nm={};
  for(const pn of [...new Set(tasks.flatMap(t=>[t.page,t.projRef].filter(Boolean)))]){
    if(pn==="(no page)") continue;
    const k=pn.toLowerCase();
    try{
      const p=await logseq.Editor.getPage(pn);
      const props=Object.assign({},(nm[k]&&nm[k].props)||{},(p&&p.properties)||{});
      nm[k]={props,
        journal:!!(p&&(p["journal?"]||p.journalDay))||(nm[k]&&nm[k].journal)||false,
        jday:(p&&p.journalDay)||(nm[k]&&nm[k].jday)||null,
        template:!!props.template||/(^|\/)templates?$/i.test(pn)};
    }catch(e){ if(!nm[k]) nm[k]={props:{},journal:false,jday:null,template:false}; }
  }
  pageMeta=nm;
  // canonical display name per project (case-insensitive; real page name wins over how a link was typed)
  projCanon={};
  tasks.forEach(t=>{ const p=projOf(t), k=p.toLowerCase(); if(!(k in projCanon)) projCanon[k]=p; });
  tasks.forEach(t=>{ if(/^[^\/]+\//.test(t.page)) projCanon[t.page.toLowerCase()]=t.page; });
  // every namespaced page in the graph (Area/…, Resources/…, Archive/…) — listed even with zero tasks
  allNsPages=[];
  try{
    const all=await logseq.Editor.getAllPages();
    (all||[]).forEach(p=>{
      const name=p.originalName||p.name;
      if(!name||name.indexOf("/")<0) return;
      if(p["journal?"]||p.journalDay) return;
      const props=p.properties||{};
      if(props.template) return;
      const k=name.toLowerCase();
      if(!pageMeta[k]) pageMeta[k]={props,journal:false,jday:null,template:false};
      if(!projCanon[k]) projCanon[k]=name;
      allNsPages.push(name);
    });
  }catch(e){ console.error("getAllPages failed",e); }
  // tasks on a journal page inherit that day as their date (like Agenda)
  tasks.forEach(t=>{
    const md=metaOf(t.page);
    t.jdate=md.jday?String(md.jday).replace(/(\d{4})(\d{2})(\d{2})/,"$1-$2-$3"):"";
  });
  if(projectFilter && !tasks.some(t=>t.page===projectFilter)) projectFilter=null;
  if(statusFilter && !allStatuses().includes(statusFilter)) statusFilter=null;
  draw();
}
function pageStatus(pn){
  const v=(metaOf(pn).props||{}).status;
  return v==null?"":String(Array.isArray(v)?v.join(", "):v);
}
function allStatuses(){
  return [...new Set(tasks.map(t=>pageStatus(projKey(t))).filter(Boolean))].sort();
}
/* the “project” a task belongs to: its page if namespaced (type/name), else the first [[type/name]] link in it, else its page */
function projOf(t){ return /^[^\/]+\//.test(t.page) ? t.page : (t.projRef||t.page); }
function projKey(t){ const p=projOf(t); return projCanon[p.toLowerCase()]||p; } // case-insensitive canonical name
function ft(){
  let r=tasks;
  if(statusFilter) r=r.filter(t=>pageStatus(projKey(t))===statusFilter);
  if(projectFilter) r=r.filter(t=>projKey(t)===projectFilter);
  return r;
}
function filterablePages(){
  const counts={};
  tasks.forEach(t=>{
    const key=projKey(t);
    const meta=metaOf(key);
    if(meta.journal||meta.template||key==="(no page)") return;
    if(statusFilter && pageStatus(key)!==statusFilter) return; // narrow project chips to chosen status
    counts[key]=(counts[key]||0)+1;
  });
  return counts;
}
function chipbar(){
  const counts=filterablePages();
  const pages=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const statuses=allStatuses();
  if(!pages.length&&!projectFilter&&!statusFilter) return "";
  const parts=[];
  if(projectFilter) parts.push(projectFilter);
  if(statusFilter) parts.push("status: "+statusFilter);
  let h=`<div class="chipbar"><span class="chip ${parts.length?"active":""}" data-ctoggle="1" style="font-weight:700">🔍 Filter: ${esc(parts.join(" · ")||"All")} ${chipsOpen?"▴":"▾"}</span>`;
  if(chipsOpen){
    if(statuses.length){
      h+=`</div><div class="chipbar"><span class="lbl">STATUS:</span>
        <span class="chip ${!statusFilter?"active":""}" data-pstatus="">All</span>`+
        statuses.map(s=>`<span class="chip ${statusFilter===s?"active":""}" data-pstatus="${esc(s)}">${esc(s)}</span>`).join("");
    }
    h+=`</div><div class="chipbar"><span class="lbl">PROJECT:</span>
      <span class="chip ${!projectFilter?"active":""}" data-proj="">All (${statusFilter?Object.values(counts).reduce((a,b)=>a+b,0):tasks.length})</span>`+
      pages.map(p=>`<span class="chip ${projectFilter===p?"active":""}" data-proj="${esc(p)}">${esc(p)} (${counts[p]})</span>`).join("");
  }
  return h+`</div>`;
}
function wireChips(m){
  m.querySelectorAll("[data-ctoggle]").forEach(el=>el.onclick=()=>{ chipsOpen=!chipsOpen; draw(); });
  m.querySelectorAll("[data-proj]").forEach(ch=>ch.onclick=()=>{ projectFilter=ch.dataset.proj||null; draw(); });
  m.querySelectorAll("[data-pstatus]").forEach(ch=>ch.onclick=()=>{
    statusFilter=ch.dataset.pstatus||null;
    if(projectFilter && statusFilter && pageStatus(projectFilter)!==statusFilter) projectFilter=null;
    draw();
  });
}

/* ---------- Actions ---------- */
async function setLane(uuid,lane){
  try{
    const blk=await logseq.Editor.getBlock(uuid); if(!blk) return;
    const kw=LANE_KW[lane];
    const c=blk.content.match(MARKER_RE)? blk.content.replace(MARKER_RE,kw+" ") : kw+" "+blk.content;
    await logseq.Editor.updateBlock(uuid,c);
  }catch(e){ console.error(e); }
  await refresh();
}
async function openBlock(uuid,page){
  try{
    if(page) await logseq.Editor.scrollToBlockInPage(page,uuid);
    logseq.hideMainUI();
  }catch(e){ console.error(e); }
}
async function addEmailTask(){
  const from=document.getElementById("eFrom").value.trim();
  const subj=document.getElementById("eSubj").value.trim();
  const body=document.getElementById("eBody").value.trim();
  const lane=document.getElementById("eLane").value;
  if(!subj){ alert("Please enter at least the email subject."); return; }
  const PAGE="Email Inbox";
  try{
    if(!(await logseq.Editor.getPage(PAGE)))
      await logseq.Editor.createPage(PAGE,{},{redirect:false,createFirstBlock:false});
    const parent=await logseq.Editor.appendBlockInPage(PAGE, LANE_KW[lane]+" "+subj+" #email");
    if(parent){
      const details=["from:: "+(from||"(unknown)"),"received:: "+new Date().toISOString().slice(0,10)];
      if(body) details.push(body);
      await logseq.Editor.insertBlock(parent.uuid, details.join("\n"), {sibling:false});
    }
    document.getElementById("eFrom").value=""; document.getElementById("eSubj").value=""; document.getElementById("eBody").value="";
    document.getElementById("eOk").textContent="Added to “Email Inbox” ✔";
    setTimeout(()=>{const el=document.getElementById("eOk"); if(el) el.textContent="";},3000);
    await refresh();
  }catch(e){ console.error(e); alert("Could not add the task: "+e.message); }
}

/* ---------- Gmail bridge sync ---------- */
let syncMsg="";
function bridgeUrl(){ return ((logseq.settings&&logseq.settings.bridgeUrl)||"").trim(); }
async function syncGmail(manual){
  const url=bridgeUrl();
  if(!url){ if(manual){ syncMsg="Paste your bridge URL first (see README → Connect Gmail)."; draw(); } return; }
  syncMsg="Checking Gmail for emails labeled “logseq”…"; if(manual) draw();
  try{
    const r=await fetch(url+(url.includes("?")?"&":"?")+"t="+Date.now());
    const raw=await r.text();
    if(raw.trim().startsWith("<")) throw new Error("Google returned a sign-in page instead of data. In Apps Script: Deploy → Manage deployments → ✏️ → set “Who has access” to Anyone (exactly “Anyone”, not “Anyone with Google account”), pick Version: New version, Deploy — and make sure the URL ends in /exec, not /dev.");
    const data=JSON.parse(raw);
    if(data.error) throw new Error(data.error);
    const emails=data.emails||[];
    if(!emails.length){ syncMsg=data.note||"No new emails labeled “logseq”. Label one in Gmail, then sync again."; }
    else{
      const PAGE="Email Inbox";
      if(!(await logseq.Editor.getPage(PAGE)))
        await logseq.Editor.createPage(PAGE,{},{redirect:false,createFirstBlock:false});
      for(const em of emails){
        const parent=await logseq.Editor.appendBlockInPage(PAGE,
          "TODO "+em.subject+" [📧]("+em.link+") #email");
        if(parent){
          const lines=["from:: "+(em.from||"(unknown)"),"received:: "+(em.date||"")];
          if(em.snippet) lines.push(em.snippet);
          await logseq.Editor.insertBlock(parent.uuid,lines.join("\n"),{sibling:false});
        }
      }
      syncMsg="Imported "+emails.length+" email"+(emails.length>1?"s":"")+" → “Email Inbox” ✔";
    }
  }catch(e){ syncMsg="Sync failed: "+e.message+" (check the URL and that the script is deployed to “Anyone”)."; }
  await refresh();
}

function fmtJournal(d,f){
  const M=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const D=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const n=d.getDate();
  const ord=n+(n%10===1&&n%100!==11?"st":n%10===2&&n%100!==12?"nd":n%10===3&&n%100!==13?"rd":"th");
  const map={yyyy:d.getFullYear(),yy:String(d.getFullYear()).slice(-2),MMMM:M[d.getMonth()],MMM:M[d.getMonth()].slice(0,3),
    MM:String(d.getMonth()+1).padStart(2,"0"),M:String(d.getMonth()+1),dd:String(n).padStart(2,"0"),do:ord,d:String(n),
    EEEE:D[d.getDay()],EEE:D[d.getDay()].slice(0,3)};
  return f.replace(/yyyy|yy|MMMM|MMM|MM|M|do|dd|d|EEEE|EEE/g,x=>map[x]);
}
async function createMeeting(){
  const sel=[...document.querySelectorAll("#dList input:checked")].map(c=>c.dataset.u);
  if(!discussName){ alert("Type the attendee's name first."); return; }
  try{
    const cfg=await logseq.App.getUserConfigs();
    const journal=fmtJournal(new Date(),(cfg&&cfg.preferredDateFormat)||"MMM do, yyyy");
    const parent=await logseq.Editor.appendBlockInPage(journal,"Meeting with [["+discussName+"]] #meeting");
    if(!parent) throw new Error("couldn't write to today's journal page ("+journal+")");
    for(const u of sel){
      try{ await logseq.Editor.upsertBlockProperty(u,"id",u); }catch(e){} // make the block referenceable
      await logseq.Editor.insertBlock(parent.uuid,"(("+u+"))",{sibling:false});
    }
    await logseq.Editor.insertBlock(parent.uuid,"",{sibling:false}); // empty line ready for notes
    discussMsg="Created “Meeting with "+discussName+"” in today's journal with "+sel.length+" topic"+(sel.length===1?"":"s")+" ✔";
    await logseq.App.pushState("page",{name:journal});
    logseq.hideMainUI();

}

function colOrders(){ try{ return JSON.parse((logseq.settings&&logseq.settings.colOrder)||"{}"); }catch(e){ return {}; } }
function applyColOrder(cols,tableKey){
  const ord=colOrders()[tableKey]; if(!ord) return cols;
  return cols.slice().sort((a,b)=>{
    let i=ord.indexOf(a.key), j=ord.indexOf(b.key);
    if(i<0) i=ord.length+cols.indexOf(a);
    if(j<0) j=ord.length+cols.indexOf(b);
    return i-j;
  });
}
function saveColOrder(tableKey,keys){
  const all=colOrders(); all[tableKey]=keys;
  logseq.updateSettings({colOrder:JSON.stringify(all)});
}
function wireColDrag(m,tableKey,keys){
  let dk=null;
  m.querySelectorAll("th[data-col]").forEach(th=>{
    th.ondragstart=()=>{ dk=th.dataset.col; };
    th.ondragover=e=>e.preventDefault();
    th.ondrop=e=>{ e.preventDefault(); const t=th.dataset.col;
      if(!dk||dk===t) return;
      const arr=keys.slice(), f=arr.indexOf(dk), to=arr.indexOf(t);
      arr.splice(to,0,arr.splice(f,1)[0]);
      saveColOrder(tableKey,arr); dk=null; draw(); };

    <div class="wh" style="cursor:pointer;margin-bottom:${unsOpen?"6px":"0"}" data-uns="1">📥 Unscheduled TODOs (${uns.length}) ${unsOpen?"▴":"▾"}</div>`+
    (unsOpen?`<div class="unslist">`+uns.slice(0,40).map(taskHtml).join("")+`</div>`+
      (uns.length>40?`<p class="hint">+${uns.length-40} more — see Table → All tasks</p>`:""):"")+`</div>`:"";
  const cols=days.map(d=>{
    const ds=isoD(d);
    const gevts=((gcal&&gcal[ds])||[]).filter(e=>!e.time); // all-day events stay up here
    const dts=ft().filter(t=>effDate(t)===ds);
    const done=dts.filter(t=>t.lane==="done"), open=dts.filter(t=>t.lane!=="done");
    const pct=dts.length?Math.round(done.length/dts.length*100):0;
    return `<div class="wday ${ds===todayIso?"today":""}" data-ds="${ds}">
      <div class="wh">${d.toLocaleDateString(undefined,{weekday:"short"})} <b>${fmt(d)}</b>${dts.length?` <span style="float:right">${done.length}/${dts.length}</span>`:""}</div>
      ${dts.length?`<div class="bar wbar"><i style="width:${pct}%"></i></div>`:""}
      <div class="wadd"><input placeholder="＋ Add a task" data-add="${ds}"></div>`+
      gevts.map(e=>`<div class="evt gcal" title="${esc(e.cal||"Google Calendar")}">🗓 ${esc(e.title)}</div>`).join("")+
      open.map(taskHtml).join("")+done.map(taskHtml).join("")+
      `</div>`;
  }).join("");
  // time box row: timed Google Calendar events + timed tasks on an hour grid
  const timeCols=days.map(d=>{
    const ds=isoD(d);
    const timed=((gcal&&gcal[ds])||[]).filter(e=>e.time).sort((x,y)=>x.time.localeCompare(y.time));
    let blocks=timed.map(e=>{
      const s=hm(e.time); if(s===null) return "";
      let en=hm(e.end); if(en===null||en<=s) en=s+1;
      const top=Math.max(0,(s-HB)*HPX), bot=Math.min(TH,(en-HB)*HPX);
      if(bot<=0||top>=TH) return ""; // outside 06:00–18:00
      return `<div class="tevt" style="top:${top}px;height:${Math.max(18,bot-top)}px"
        title="${esc(e.title)} · ${e.time}${e.end?"–"+e.end:""}${e.cal?" · "+esc(e.cal):""}">${e.time} ${esc(e.title)}</div>`;
    }).join("");
    blocks+=ft().filter(t=>t.date===ds&&t.time).map(t=>{
      const s=hm(t.time); if(s===null) return "";
      const top=Math.max(0,(s-HB)*HPX);
      if(top>=TH||(s+0.5-HB)*HPX<=0) return "";
      return `<div class="tevt task k-${t.lane}" style="top:${top}px;height:${HPX/2}px" data-open="1" data-u="${t.uuid}" data-p="${esc(t.page)}"
        title="${esc(t.title)} · ${t.time}">${t.time} ${esc(t.title)}</div>`;
    }).join("");
    return `<div class="tcol ${ds===todayIso?"today":""}" data-ds="${ds}" style="height:${TH}px">${blocks}</div>`;
  }).join("");
  const gut=[...Array(HE-HB+1)].map((_,i)=>`<div class="tlab" style="top:${i*HPX-6}px">${String(HB+i).padStart(2,"0")}:00</div>`).join("");
  m.innerHTML=chipbar()+`<div class="calhead"><button class="cbtn" id="cPrev">◀</button>
    <h2>${fmt(days[0])} – ${fmt(days[6])}, ${days[6].getFullYear()}</h2>
    <span><button class="cbtn" id="cMode">🗓 Month</button> <button class="cbtn" id="cToday">Today</button> <button class="cbtn" id="cNext">▶</button></span></div>
    ${unsHtml}
    <div class="wscroll">
      <div class="wrow"><div></div>${cols}</div>
      <div class="tboxh">⏱ Time box — Google Calendar, ${String(HB).padStart(2,"0")}:00–${HE}:00</div>
      <div class="wrow"><div class="tgut" style="height:${TH}px">${gut}</div>${timeCols}</div>
    </div>
    <p class="hint">Tick a task to mark it DONE (untick to reopen). <b>Drag any TODO</b> (from Unscheduled or between days) onto a day to schedule it — or onto the time box to give it a time (snaps to 30 min). Type in “＋ Add a task” + Enter to create; click an empty time-box slot to create at that time. ${esc(gcalMsg)}</p>`;
  document.getElementById("cPrev").onclick=()=>{weekAnchor.setDate(weekAnchor.getDate()-7);draw();};
  document.getElementById("cNext").onclick=()=>{weekAnchor.setDate(weekAnchor.getDate()+7);draw();};
  document.getElementById("cToday").onclick=()=>{weekAnchor=new Date();draw();};
  document.getElementById("cMode").onclick=()=>{calMode="month";draw();};
  m.querySelectorAll("[data-uns]").forEach(el=>el.onclick=()=>{ unsOpen=!unsOpen; draw(); });
  m.querySelectorAll("[data-donecb]").forEach(cb=>cb.onchange=()=>toggleDone(cb.dataset.donecb));
  m.querySelectorAll("[data-add]").forEach(inp=>inp.onkeydown=e=>{
    if(e.key==="Enter"&&inp.value.trim()){
      const v=inp.value.trim(); inp.value="";
      const tm=(pendingSlot&&pendingSlot.ds===inp.dataset.add)?pendingSlot.time:"";
      pendingSlot=null;
      addDayTask(inp.dataset.add,v,tm);
    }
  });
  // drag a TODO (from Unscheduled or another day) onto a day → schedule it there
  m.querySelectorAll(".wtask").forEach(el=>{
    el.ondragstart=e=>e.dataTransfer.setData("text/plain","sched:"+el.dataset.u);
  });
  m.querySelectorAll(".wday").forEach(day=>{
    day.ondragover=e=>{e.preventDefault();day.classList.add("dragover");};
    day.ondragleave=()=>day.classList.remove("dragover");
    day.ondrop=e=>{e.preventDefault();day.classList.remove("dragover");
      const d=e.dataTransfer.getData("text/plain");
      if(d.startsWith("sched:")) setSchedule(d.slice(6),day.dataset.ds);};
  });
  // click an empty slot in the time box → arm that day's add-box; drop a TODO there → schedule at that time
  const slotTime=(col,clientY)=>{
    const y=clientY-col.getBoundingClientRect().top;
    const h=HB+Math.floor(y/HPX*2)/2; // snap to 30 min
    return String(Math.floor(h)).padStart(2,"0")+":"+(h%1?"30":"00");
  };
  m.querySelectorAll(".tcol").forEach(col=>{
    col.onclick=e=>{
      if(e.target!==col) return; // clicks on events/tasks handled elsewhere
      const time=slotTime(col,e.clientY);
      pendingSlot={ds:col.dataset.ds,time};
      const inp=m.querySelector(`input[data-add="${col.dataset.ds}"]`);
      if(inp){ inp.placeholder="＋ Add at "+time+" — type & press Enter"; inp.focus(); }
    };
    col.ondragover=e=>{e.preventDefault();col.classList.add("dragover");};
    col.ondragleave=()=>col.classList.remove("dragover");
    col.ondrop=e=>{e.preventDefault();col.classList.remove("dragover");
      const d=e.dataTransfer.getData("text/plain");
      if(d.startsWith("sched:")) setSchedule(d.slice(6),col.dataset.ds,slotTime(col,e.clientY));};
  });
  wireChips(m); wire(m);
}
function drawCalendar(m){
  if(!gcalRequested && bridgeUrl()){ gcalRequested=true; loadGcal(); }
  if(calMode==="week"){ drawWeek(m); return; }
  const first=new Date(calY,calM,1), start=first.getDay(), dim=new Date(calY,calM+1,0).getDate();
  const prevDim=new Date(calY,calM,0).getDate();
  const todayIso=new Date().toISOString().slice(0,10);
  const iso=(y,mo,d)=>{const dt=new Date(y,mo,d);return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");};
  let cells="";
  for(let i=0;i<42;i++){
    const dn=i-start+1; let label,dimc="",dstr;
    if(dn<1){label=prevDim+dn;dimc="dim";dstr=iso(calY,calM-1,label);}
    else if(dn>dim){label=dn-dim;dimc="dim";dstr=iso(calY,calM+1,label);}
    else{label=dn;dstr=iso(calY,calM,dn);}
    const evts=ft().filter(t=>effDate(t)===dstr);
    const gevts=(gcal&&gcal[dstr])||[];
    cells+=`<div class="day ${dimc} ${dstr===todayIso?"today":""}"><div class="n">${label}</div>`+
      gevts.map(e=>`<div class="evt gcal" title="${esc(e.title)} (Google Calendar)">🗓 ${e.time?e.time+" ":""}${esc(e.title)}</div>`).join("")+
      evts.map(t=>`<div class="evt k-${t.lane}" data-open="1" data-u="${t.uuid}" data-p="${esc(t.page)}" title="${esc(t.title)}">${esc(t.title)}</div>`).join("")+`</div>`;
  }
  m.innerHTML=chipbar()+`<div class="calhead"><button class="cbtn" id="cPrev">◀</button>
    <h2>${first.toLocaleDateString(undefined,{month:"long",year:"numeric"})}</h2>
    <span><button class="cbtn" id="cMode">📆 Week</button> <button class="cbtn" id="cToday">Today</button> <button class="cbtn" id="cNext">▶</button></span></div>
    <div class="calgrid">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="dow">${d}</div>`).join("")}${cells}</div>
    <p class="hint">Shows tasks with a SCHEDULED or DEADLINE date (⚑ = deadline) plus your Google Calendar events (🗓 green outline). ${esc(gcalMsg)}</p>`;
  document.getElementById("cPrev").onclick=()=>{calM--; if(calM<0){calM=11;calY--;} draw();};
  document.getElementById("cNext").onclick=()=>{calM++; if(calM>11){calM=0;calY++;} draw();};
  document.getElementById("cToday").onclick=()=>{const n=new Date();calY=n.getFullYear();calM=n.getMonth();draw();};
  document.getElementById("cMode").onclick=()=>{ calMode="week";
    const n=new Date(); weekAnchor=(n.getFullYear()===calY&&n.getMonth()===calM)?n:new Date(calY,calM,1); draw(); };
  wireChips(m); wire(m);
}
function drawEmail(m){
  m.innerHTML=`<div class="form">
    <h2 style="font-size:15px;margin:2px 0 4px">🔗 Gmail auto-import</h2>
    <p class="hint" style="margin:0 0 10px">Label any email <b>logseq</b> in Gmail and it becomes a TODO here (with an “Open in Gmail” link). One-time setup in README → “Connect Gmail”. Auto-syncs every time you open this board.</p>
    <div class="field"><label>Bridge URL (from your Apps Script deployment, including ?key=…)</label>
      <input id="bUrl" value="${esc(bridgeUrl())}" placeholder="https://script.google.com/macros/s/…/exec?key=your-secret"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <button class="btn" id="bSave">Save</button>
      <button class="btn" id="bSync" ${bridgeUrl()?"":"disabled"} style="${bridgeUrl()?"":"opacity:.5"}">🔄 Sync now</button>
    </div>
    <p class="hint" id="bMsg" style="min-height:16px">${esc(syncMsg)}</p>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
    <h2 style="font-size:15px;margin:2px 0 4px">📧 Or paste an email manually</h2>
    <p class="hint" style="margin:0 0 14px">Copy from any email app. Creates a task block on your <b>“Email Inbox”</b> page, tagged #email, with the details as an indented child block.</p>
    <div class="field"><label>Subject → task title</label><input id="eSubj" placeholder="Quote for September event"></div>
    <div class="field"><label>From (optional)</label><input id="eFrom" placeholder="Jane Chen"></div>
    <div class="field"><label>Body / notes (optional)</label><textarea id="eBody" placeholder="Paste the email text here…"></textarea></div>
    <div class="field"><label>Start in</label><select id="eLane">
      <option value="todo">📥 To Do</option><option value="waiting">⏳ Waiting (I replied / waiting on them)</option><option value="doing">🔄 Doing</option></select></div>
    <button class="btn" id="eAdd">Add task</button><span class="ok" id="eOk"></span></div>`;
  document.getElementById("eAdd").onclick=addEmailTask;
  document.getElementById("bSave").onclick=saveBridge;
  document.getElementById("bSync").onclick=()=>syncGmail(true);
}

/* Shared event wiring: open links, dropdowns, drag & drop */
function wire(m){
  m.querySelectorAll("[data-ext]").forEach(el=>{
    el.onclick=e=>{ e.stopPropagation(); logseq.App.openExternalLink(el.dataset.ext); };
  });
  m.querySelectorAll("[data-open]").forEach(el=>{
    el.onclick=e=>{ e.stopPropagation();
      const host=el.closest("[data-u]")||el;
      openBlock(host.dataset.u||el.dataset.u, host.dataset.p||el.dataset.p); };
  });
  m.querySelectorAll("select[data-sel]").forEach(sel=>{
    sel.onclick=e=>e.stopPropagation();
    sel.onchange=()=>{ const host=sel.closest("[data-u]")||sel; setLane(host.dataset.u||sel.dataset.u, sel.value); };
  });
  m.querySelectorAll(".card").forEach(c=>{
    c.ondragstart=e=>e.dataTransfer.setData("text/plain",c.dataset.u);
  });
  m.querySelectorAll(".col").forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add("dragover");};
    col.ondragleave=()=>col.classList.remove("dragover");
    col.ondrop=e=>{e.preventDefault();col.classList.remove("dragover");
      const u=e.dataTransfer.getData("text/plain"); if(u) setLane(u,col.dataset.lane);};
  });
}

/* ---------- Plugin bootstrap ---------- */
function main(){
  logseq.useSettingsSchema([
    {key:"bridgeUrl",type:"string",default:"",title:"Gmail bridge URL",
     description:"Apps Script web-app URL including ?key=… (see README → Connect Gmail). Emails labeled “logseq” are imported automatically when the board opens."}
  ]);
  logseq.provideModel({
    async showOrbitals(){
      try{ const cfg=await logseq.App.getUserConfigs();
        document.documentElement.classList.toggle("dark",cfg.preferredThemeMode==="dark"); }catch(e){}
      await refresh();
      logseq.showMainUI();
      syncGmail(false); // quietly pull newly-labeled Gmail emails, then re-draws
    }
  });
  logseq.App.registerUIItem("toolbar",{key:"orbitals",
    template:`<a data-on-click="showOrbitals" class="button" title="Orbitals" style="font-size:17px">◉</a>`});
  logseq.App.registerCommandPalette({key:"orbitals-open",label:"Orbitals: open"},()=>{
    refresh().then(()=>logseq.showMainUI());
  });
  logseq.setMainUIInlineStyle({zIndex:100});

  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{view=b.dataset.v;draw();});
  document.getElementById("closeBtn").onclick=()=>logseq.hideMainUI();
  document.getElementById("coffeeBtn").onclick=()=>logseq.App.openExternalLink("https://buymeacoffee.com/yufenasyourfriend");
  document.getElementById("backdrop").addEventListener("click",e=>{ if(e.target.id==="backdrop") logseq.hideMainUI(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") logseq.hideMainUI(); });
  logseq.on("ui:visible:changed",({visible})=>{ if(visible) refresh(); });
}
if(typeof logseq!=="undefined"&&logseq.ready){ logseq.ready(main).catch(console.error); }
