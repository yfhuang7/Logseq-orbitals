name: Publish plugin release

# Runs whenever a version tag (v1.2.0, v1.3.0, …) is created —
# including when you create a release with a new tag in the GitHub UI.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package plugin zip
        run: |
          mkdir -p dist
          zip -j dist/logseq-orbitals-${{ github.ref_name }}.zip \
            package.json index.html icon.svg icon.png README.md LICENSE

      - name: Attach zip to the release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/logseq-orbitals-${{ github.ref_name }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
